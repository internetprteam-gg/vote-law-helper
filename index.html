{id:1,tags:['행사·이벤트'],searchTags:['행사','SNS','SNS홍보','기념품','경품'],question:'경기도가 온라인 발대식을 위한 사전 촬영에 참여하기 위하여 촬영 현장에 방문한 어린이 기자에게 경기도 명의로 기념품을 제공할 수 있는지?',answer:'경기도가 지방자치단체 업무추진비 집행에 관한 규칙 별포1 제2호 다목의 규정에 따라 발대식 사전 촬영(위촉장 수여)에 참여하기 위하여 공식적으로 방문한 어린이기자에게 경기도의 명의로 의례적인 수준의 기념품을 제공하는 것은 공직선거법 제11조제2항제4호가목의 규정에 따라 가능할 것입니다.',law:'공직선거법 제11조',docQ:'홍보미디어담당관-1144(2022.2.7.)',docA:'경기도선관위 지도1과-863(2022.2.10.)'},
{id:2,tags:['행사·이벤트'],searchTags:['행사','기자단','인사말','축사'],question:'경기도지사 권한대행이 경기도 꿈나무기자단 온라인 발대식에 참석하여 인사말을 녹화하고 기자단 카페에 게시할 수 있는지?',answer:'경기도지사 권한대행자 등이 경기도 꿈나무기자단 발대식과 관련하여 의례적인 내용의 인사말을 녹화하고 해당 녹화영상을 경기도가 운영하는 ‘기자단 카페’에 게시하는 것만으로는 공직선거법에 위반되지 않을 것입니다.',law:'해당없음',docQ:'홍보미디어담당관-1226(2022.2.8.)',docA:'경기도선관위 지도1과-929(2022.2.14.)'},
{id:3,tags:['행사·이벤트','홈페이지·온라인'],searchTags:['행사','온라인행사','행사홍보','SNS','홈페이지','이벤트'],question:'경기도 뉴스포털’ 홍보 및 특집기사 인지도 제고를 위하여 이벤트를 실시하고 참여자에게 경품을 제공할 수 있는지?',answer:'경기도 뉴스포털 누리집’ 홍보 및 특집기사 인지도 제고를 위하여 경기도 인터넷시스템 설치 및 운영에 관한 조례에 따라 경품을 제공하는 것은 공직선거법 상 가능할 것입니다. 다만, 경기도지사(경기도지사 권한대행자 포함)의 직, 성명을 밝히거나 그가 하는 것으로 추정할 수 있는 방법으로 제공하는 경우에는 행위양태에 따라 같은 법 제113조 또는 제114조에 위반될 것입니다.',law:'공직선거법 제113조, 제114조',docQ:'홍보미디어담당관-4332(2022.5.11.)',docA:'경기도선관위 지도1과-2323(2022.5.18.)'},
{id:4,tags:['행사·이벤트','홈페이지·온라인'],searchTags:['행사','온라인행사','행사홍보','SNS','SNS홍보','홈페이지','이벤트','공모'],question:'각 지자체에서 통상적으로 운영하고 있는 열린시장(도지사)실과 동일한 형태의 경기도지사 누리집의 새로운 이름을 공모하기 위하여 경기도민을 대상으로 실시하는 네이밍(명칭) 공모전을 SNS, 보도자료 등으로 홍보하는 것이 가능한지?',answer:'경기도가 열린도지사실 네이밍 공모전 행사를 안내하는 범위 내에서 SNS 등을 통하여 홍보하는 것은 공직선거법 제86조제5항제4호 및 공직선거관리규칙 제47조제4항 제3호, 제4호의 규정에 따라 가능할 것입니다.',law:'공직선거법 제86조, 공직선거관리규칙 제47조',docQ:'홍보미디어담당관-4778(2022.5.26.)',docA:'경기도선관위 지도1과-2509(2022.5.28.)'},
{id:5,tags:['홈페이지·온라인'],searchTags:['홈페이지','홍보'],question:'경기도지사 직무 개시 후 대도민 공개될 열린도지사실 누리집에 도지사 당선인 신분 기간 내 동정(활동사항)을 게재해두는 것이 가능한지?',answer:'지방자치단체 홈페이지의 특정란에 지방자치단체장 당선인의 통상적인 활동사항을 게시하는 것은 공직선거법에 위반되지 아니할 것이나, 통상적 범위를 넘어 당선자에 대한 선전에 이르는 내용을 게시할 경우 행위양태에 따라 같은 법 제60조, 제86조에 위반될 수 있을 것입니다.',law:'공직선거법 제60조, 제86조',docQ:'홍보미디어담당관-5256(2022.6.10.)',docA:'경기도선관위 지도1과-2830(2022.6.16.)'},
{id:6,tags:['행사·이벤트','홈페이지·온라인'],searchTags:['홈페이지','홍보','기자단','행사','도지사 참석'],question:'경기도 도민기자단의 민선8기 취임행사 현장 취재 및 기사발행이 가능한지?',answer:'경기도 도민기자단이 민선8기 취임행사를 취재하고 그 기사를 지방자치단체의 홈페이지(네이버 블로그 등을 포함)의 특정메뉴에 게시하거나 언론사에 보도자료를 제공하는 것은 공직선거법에 위반되지 아니할 것이나, 업적을 홍보하는 등 선거운동이나 선거에 영향을 미치는 행위에 이르지 않도록 유의하여야 할 것임',law:'공직선거법 제86조',docQ:'홍보미디어담당관-5296(2022.6.13.)',docA:'경기도선관위 지도1과-2904(2022.6.21.)'},
{id:7,tags:['행사·이벤트','홈페이지·온라인'],searchTags:['홈페이지','홍보','기자단','행사','도지사 참석'],question:'도지사가 경기도민기자단과의 소통 간담회를 갖고 인사말 및 도정을 설명하고, 기자단과 질의응답을 가지며 기자단의 의견을 수렴하는 행위를 하는 것이 가능한지? 또, 도민기자단 간담회 개최 상황을 경기도 홈페이지 ‘소셜방송 LIVE경기’를 통해 실시간으로 송출하고, 도 홈페이지, 블로그 등에 기사를 게재할 수 있는지?',answer:'경기도가 경기도민가자단 간담회를 개최하면서 경기도 공식 홈페이지 내 특정 메뉴에서 생중계하거나 도민기자단이 취재한 관련 기사를 홈페이지(블로그 포함)에 게시하는 것만으로는 공직선거법에 위반되지 아니할 것이나, 경기도지사의 업적을 홍보하는 등 선거운동이나 선거에 영향을 미치는 행위에 이르지 않도록 유의하여야 할 것임',law:'공직선거법 제86조',docQ:'홍보미디어담당관-5479(2022.6.20.)',docA:'경기도선관위 지도1과-2913(2022.6.22.)'},
{id:8,tags:['행사·이벤트','인쇄·홍보물'],searchTags:['브랜드','기념품','경품'],question:'경기도 브랜드 기념품을 도민에게 제공할 수 있는지?',answer:'경기도가 자체 사업계획과 예산으로 법령(중앙행정기관이 법령에 따라 수립, 시달한 지침 포함)이나 대상, 방법, 범위 등을 구체적으로 정한 경기도의 조례에 근거하여 그 명의로 경기도 대표상징물이나 도정슬로건이 표기된 경기도 브랜드 홍보물품을 기념품으로 제공하는 것이라면 공직선거법 제112조제2항제4호 가목 또는 나목에 따라 가능할 것이나, 그 범위를 벗어나 제공하거나 경기도지사의 직, 성명을 밝히거나 그가 하는 것으로 추정할 수 있는 방법으로 제공하는 경우에는 행위양태에 따라 같은 법 제113조 또는 제114조에 위반될 것입니다.',law:'공직선거법 제113조, 제114조',docQ:'홍보콘텐츠담당관-5351(2022.6.30.)',docA:'경기도선관위 지도1과-3224(2022.7.8.)'},
{id:9,tags:['SNS','행사·이벤트'],searchTags:['행사','SNS','행사홍보','SNS홍보','기념품','경품'],question:'경기도가 벚꽃축제를 개최하고 X배너를 설치하여 경기도 카톡채널을 친구 추가한 사람에게 기념품을 제공할 수 있는지?',answer:'경기도가 실시하는 벚꽃축제는 「경기도 도민 소통 활성화에 관한 조례」제7조제1항에 따른 행사로 볼 수 없을 것이며, 동 조례 같은 제2항에 따르면 참여횟수, 실적 등 기여도를 고려하여 기념품 등을 제공할 수 있으므로 귀문과 같이 단순히 경기도 카카오톡 채널을 추가한 선거구민에게 기념품을 제공하는 경우에는 행위양태에 따라 「공직선거법」제113조 또는 제114조에 위반될 것입니다.',law:'공직선거법 제113조, 제114조',docQ:'정책홍보담당관-2687(2023.3.13.)',docA:'경기도선관위 지도1과-891(2023.3.16.)'},
{id:10,tags:['SNS','행사·이벤트'],searchTags:['행사','SNS','SNS홍보','기념품','경품'],question:'경기도가 도 부서 및 공공기관, 그 소속 직원(공무원, 공무직, 기간제근로자, 공공기관 임직원)에게 포상금 등의 인센티브를 지급할 수 있다는 조항을 담아 조례를 개정할 수 있는지?',answer:'조례의 제개정의 타당성에 관한 질의회답은 선거관리위원회 소관이 아니므로 회신이 어려우나, 경기도가 자체 사업계획과 예산으로 대상･방법･범위 등을 구체적으로 정한 조례에 따라 금품을 제공하는 것은 「공직선거법」제112조 제2항 제4호 나목에 따라 가능할 것임. 단 경기도가 표창･포상하는 경우 소속 공무원에 대하여 종전의 관례에서 벗어나지 아니하는 범위 안에서 부상(포상금 등 포함. 이하 같음)을 수여하는 외에 일반 선거구민에게 부상을 수여할 수 없을 것입니다.',law:'공직선거법 제112조',docQ:'정책홍보담당관-3819(2023.4.12.)',docA:'경기도선관위 지도1과-1197(2023.4.18.)'},
{id:11,tags:['홈페이지·온라인','행사·이벤트'],searchTags:['행사','발대식','기자단','기회기자단'],question:'기회기자단 발대식에 도지사 참석이 가능한지, 기자단이 향후 현장을 취재한 내용을 게시할 수 있는지?',answer:'선거일 60일부터 선거일에 해당되지 않는 경우에는 도지사 참석과 기사 게시가 가능하나, 선거일전 60일부터 선거일까지는 「공직선거법」제86조 제2항 제4호 각 목에 규정된 경우를 제외하고는 각종 행사를 개최하거나 후원할 수 없는 바, 해당기간에 기회기자단 위촉식을 개최하는 경우에는 같은 법 같은 조에 위반',law:'공직선거법 제86조',docQ:'도민소통담당관-392(2024.1.9.)',docA:'경기도선관위 지도1과- 208(2024.1.12.)'},
{id:12,tags:['인쇄·홍보물','행사·이벤트'],searchTags:['도정소식지','소식지','나의경기도'],question:'도정소식지 독자참여 코너에서 독자(도민)을 초청해 식사를 제공할 수 있는지?',answer:'경기도가 「공직선거법」제86조 제2항에 의한 선거일전 60일부터 선거일까지의 기간이 아닌 때에 「경기도 도정소식지 발행 조례」제9조에 의한 도민 또는 도정소식지 독자의 도정에 대한 관심을 높이기 위하여 독자참여 이벤트를 실시하고 추첨을 통해 당첨된 자에게 급부와 반대급부간 균형을 벗어나지 않는 범위에서 현금 또는 상품권에 상응하는 식사를 제공하는 것은 같은 법 제112조 제2항 제4호 나목에 따라 가능할 것입니다. 다만, 경기도지사의 직･성명을 밝히거나 그가 하는 것으로 추정되는 방법으로 제공하는 경우에는 행위양태에 따라 같은 법 제113조 또는 제114조에 위반',law:'공직선거법 제86조',docQ:'도민소통담당관-1781(2024.2.16.)',docA:'경기도선관위 지도1과-359(2024.2.21.)'},
{id:13,tags:['광고'],searchTags:['광고제작','광고'],question:'주요 정책 홍보물을 제작하고 광고함에 있어 가능한 것과 불가능한 것은 무엇인지?',answer:'도민의 일상생활에 필요한 정보를 제공하기 위하여 홍보물을 제작하고 매체를 이용하여 홍보하는 것은 「공직선거법」제86조 제5항 제4호 및 「공직선거관리규칙」제47조 제4항 제4호에 따라 가능하지만, 주민의 일상생활에 필요한 정보제공의 범위를 벗어나 경기도의 사업계획･추진실적 그 밖에 활동상황을 알리기 위한 홍보물에 해당할 경우 경기도가 개설･운영하는 홈페이지 또는 유튜브(‘알림’기능 제외) 채널에 홍보물을 게시하는 외에 경기도가 개설･운영하는 SNS, 그 밖에 TV, 라디오, G버스, 아파트 미디어보드 등에 게시･방송하는 경우에는 같은 법 제86조 제5항에 따른 분기별 1종 1회로 발행･배부 또는 방송이 제한되는 홍보물에 해당',law:'공직선거법 제86조',docQ:'도민소통담당관-1957(2024.2.23.)',docA:'경기도선관위 지도1과-1040(2024.2.28.)'},
{id:14,tags:['행사·이벤트'],searchTags:['행사','공모전','시상금','경품'],question:'경기도가 공모전 시상식을 통해 입상한 수상자에게 상장을 수여하고 부상(시상금 포함)을 제공할 수 있는지?',answer:'경기도가 업무에 직접적･구체적으로 활용할 목적으로 공모전을 개최하고 공모전 입상자에게 경기도의 명의로 상장 및 통상적인 범위의 부상(시상금 포함)을 제공하는 것은 역무에 대한 대가 제공으로 보아 「공직선거법」제112조 제2항 제4호 차목에 따라 가능할 것입니다. 다만, 경기도지사가 직접 주거나 경기도지사의 직명 또는 성명을 밝히는 등 그가 하는 것으로 추정할 수 있는 방법으로 제공하는 경우에는 행위양태에 따라 같은 법 제113조 또는 제114조에 위반될 것임.',law:'공직선거법 제112조, 제113조, 제114조',docQ:'정책홍보담당관-3062(2024.3.26.)',docA:'경기도선관위 지도1과-1573(2024.3.29.)'},
{id:15,tags:['홈페이지·온라인'],searchTags:['홈페이지','공약'],question:'홈페이지 초기화면에 도지사의 공약추진현황을 표기할 수 있는지?',answer:'경기도가 경기도지사의 공약추진현황을 객관적으로 평가하고 그 결과를 경기도가 개설한 대표 홈페이지에 귀문과 같이 게시하는 것은 「공직선거법」상 가능. 다만, 경기도지사의 업적을 홍보하거나 선거에 영향을 미치는 내용이 부가되는 경우에는 행위양태에 따라 같은 법 제9조, 제60조, 제85조, 제86조, 제254조에 위반될 것',law:'공직선거법 제9조, 제60조, 제86조, 제254조',docQ:'도민소통담당관-4306(2024.5.3.)',docA:'경기도선관위 지도1과-2336(2024.5.9.)'},
{id:16,tags:['행사·이벤트'],searchTags:['행사'],question:'경기도가 경기도지사가 참석하는 주요 도정현장 방문행사를 통해 도민 의견 청취, 사업 추진상황 점검 등을 실시할 수 있는지?',answer:'경기도지사가 선거와 무관하게 민선8기 3년차를 맞이하여 도정현장 점검 및 정책 관련 도민의견 청취 등을 위해 도정현장을 방문하는 것은 직무상 행위로서 「공직선거법」상 가능할 것입니다. 다만, 행사 진행과정에서 경기도지사의 업적을 홍보하거나 지지·선전하는 등 선거에 영향을 미치는 행위가 부가되지 않도록 유의하여야 할 것입니다.',law:'공직선거법 제86조',docQ:'정책홍보담당관-5668(2024.6.14.)',docA:'경기도선관위 지도1과-2995(2024.6.19.)'},
{id:17,tags:['SNS','홈페이지·온라인'],searchTags:['성과홍보','1종1회','1종1회 성과홍보','사진','도지사 사진'],question:'성과홍보 시 지사의 사진이 담긴 홍보물이 발행될 수 있는지?',answer:'분기별 1회1종으로는 가능하나, 발행배부가 가능한 홍보물일지라도 경기도지사의 업적홍보에 이르거나 지사의 사진에 담긴 모습이 지자체의 대표자로서의 의례적인 참석모습이 아닌 도지사 개인의 적극적인 기여 또는 활동에 이르는 것으로 보일 경우에는 선거법 위반임',law:'공직선거법 제86조',docQ:'도민소통담당관-5809(2024.6.21.)',docA:'경기도선관위 지도1과-3159(2024.6.24.)'},
{id:18,tags:['SNS','광고','행사·이벤트'],searchTags:['SNS','SNS홍보','통큰세일','공공기관'],question:'경기도 공공기관이 주최하는 행사를 홍보할 수 있는지?',answer:'경기도가 운영하는 공식 SNS에 공공기관이 주최하는 행사를 단순히 알리는 것은 「공직선거법」상 가능하지만, 주최기관을 명시하였더라도 표현 방법･내용 등을 종합적으로 고려하여 볼 때 경기도가 하는 것으로 추정할 수 있는 방법으로 홍보하거나 경기도와 공동으로 개최하는 것으로 볼 수 있는 경우에는 행위양태에 따라 같은 법 제113조 내지 제115조에 위반될 수 있을 것이며, 도민의 일상생활에 필요한 정보제공의 범위를 벗어나 경기도의 사업계획･추진실적 그 밖에 활동상황(경기도지사의 성명･사진･활동상황･공약실천사항 기타 업적 포함)이 포함된 홍보물을 SNS를 통하여 홍보하는 경우에는 같은 법 제86조 제5항에 따라 분기별 1종 1회로 제한될 것',law:'공직선거법 제86조',docQ:'도민소통담당관-8561(2024.9.9.)',docA:'경기도선관위 지도1과-4162(2024.9.13.)'},
{id:19,tags:['SNS','행사·이벤트'],searchTags:['이벤트','이벤트경품','경품','기념품'],question:'민간기업에서 후원한 물품을 이벤트 참여자에게 경품으로 제공할 수 있는지?',answer:'귀문의 경우 경기도가 도민과의 소통 활성화를 위하여 「경기도 도민 소통 활성화에 관한 조례」제7조 제1항 각 호에 규정된 행사를 실시하고 같은 조례 제7조 제2항에 따라 참여횟수･실적 등 도민의 소통활성화 기여도 등을 고려하여 참여한 도민에게 경품을 제공하는 경우라면 「공직선거법」제112조 제2항 제4호 나목에 따라 가능. 다만, 동 조례의 범위를 벗어나 단순 참여자에게 제공하거나 경기도지사의 직･성명을 밝히는 등 그가 하는 것으로 추정되는 방법으로 제공하는 경우에는 행위양태에 따라 같은 법 제113조 내지 제115조에 위반될 수 있을 것',law:'공직선거법 제112조, 제113조, 제115조',docQ:'도민소통담당관-8561(2024.9.9.)',docA:'경기도선관위 지도1과-4162(2024.9.13.)'},
{id:20,tags:['SNS','홈페이지·온라인'],searchTags:['홈페이지','정책비교','정책','중앙정부'],question:'지방자치단체가 ‘정부’ 또는 ‘중앙’ 등 표현을 이용하여 정부에서 시행중인 정책과 지자체가 시행중인 정책을 비교하는 홍보물을 제작하여 배포할 수 있는지?',answer:'지방자치단체가 ‘정부’ 또는 ‘중앙’이라는 표현을 사용하는 것만으로는 「공직선거법」상 제한되지 않을 것. 지방자치단체가 개설한 인터넷 홈페이지에 지방자치단체의 사업계획·추진실적 기타 지방자치단체의 활동상황 등을 게시하는 것은 의례적·직무상의 행위로서 「공직선거법」상 가능할 것입니다. 다만, 지방자치단체장의 업적을 홍보하거나 선거에 영향을 미치는 내용이 부가되는 경우에는 행위양태에 따라 같은 법 제9조, 제60조, 제85조, 제86조, 제254조에 위반될 것',law:'공직선거법 제9조, 제60조, 제86조, 제254조',docQ:'도민소통담당관-1670(2025.2.19.)',docA:'경기도선관위 지도1과-747(2025.2.25.)'},
{id:21,tags:['행사·이벤트'],searchTags:['행사','위촉식','홍보대사'],question:'경기도 홍보대사 위촉식에 도지사가 참석하여 위촉장을 수여하는 등의 행위를 할 수 있는지?',answer:'지방자치단체가 직무의 일환으로 「경기도 홍보대사 운영에 관한 조례」에 따라 위촉 대상자에게 위촉장을 수여하고, 해당 위촉식에 도지사가 참석하여 의례적인 인사말, 기념촬영 등을 하는 것은 제한되지 않을 것이나, 위촉식 과정에서 도지사의 업적을 홍보하거나 선거에 영향을 미칠 수 있는 행위가 부가되는 경우에는 행위주체 및 양태에 따라 같은 법 제9조, 제60조, 제86조, 제254조에 위반될 것임',law:'공직선거법 제9조, 제60조, 제86조, 제254조',docQ:'정책홍보담당관-2528(2025.3.19.)',docA:'경기도선관위 지도1과-3347(2025.3.24.)'},
{id:22,tags:['SNS','홈페이지·온라인','인쇄·홍보물','행사·이벤트'],searchTags:['행사','위촉식','홍보대사'],question:'경기도 홍보대사 위촉식에 관련한 홍보를 할 수 있는지?',answer:'지방자치단체가 직무의 일환으로 실시한 홍보대사 위촉식에 관련한 보도자료를 언론사에 배포하거나 지방자치단체가 개설, 운영하고 있는 홈페이지, SNS 등에 게시하는 것만으로는 같은 법상 제한되지 않을 것이나, 지방자치단체의 사업계획, 추진실적, 그 밖에 지방자치단체의 활동상황을 알리는 내용이 부가되는 경우에는 같은 법 제86조 제5항에 따라 분기별 1종 1회로 발행, 배부가 제한되는 홍보물에 해당할 것임',law:'공직선거법 제86조',docQ:'정책홍보담당관-2528(2025.3.19.)',docA:'경기도선관위 지도1과-3347(2025.3.24.)'},
{id:23,tags:['SNS','홈페이지·온라인'],searchTags:['홈페이지','성금 모금','재난','기억과연대','기억과 연대'],question:'경기도 관할을 벗어난 타 지자체 또는 국가에서 발생한 재난에 대하여 성금 모금을 위한 홍보물을 제작하여 게시할 수 있는지?',answer:'지방자치단체가 자연재난 성금 모금 홍보 이미지를 지방자치단체가 개설·운영하는 인터넷 홈페이지, SNS에 게시하는 것만으로는 「공직선거법」에 위반되지 않을 것이나, 직접적인 모금 주체가 되어 경기도가 소유한 계좌 등으로 후원받는 등의 행위는 「기부금품법」제5조 제1항에 따라 불가',law:'공직선거법 제86조, 기부금품법 제5조',docQ:'도민소통담당관-2824(2025.3.28.)',docA:'경기도선관위 지도1과-1129(2025.4.4.)'},
{id:24,tags:['SNS','홈페이지·온라인'],searchTags:['성과홍보','1종1회','1종1회 성과홍보'],question:'홈페이지 내에 성과홍보를 위한 기획콘텐츠를 제작하여 게시할 수 있는지?',answer:'지방자치단체가 추진하는 사업의 지원대상, 지원금액, 신청방법 등 주민의 일상생활에 필요한 정보를 제공하기 위한 범위내에서 홍보물을 제작하여 귀문의 매체를 활용하여 홍보하는 것은 「공직선거법」 제86조 제5항 및 「공직선거관리규칙」 제47조 제4항 제4호에 따라 가능할 것이나, 카카오톡 채널알림 메시지를 활용하여 전송하는 경우에는 같은 법 제86조 제5항에 따라 분기별 1종 1회로 발행·배부가 제한되는 홍보물에 해당될 것이므로 카카오톡 메시지 발송을 분기별 1종 1회로 지정하여야 할 것임',law:'공직선거법 제86조',docQ:'도민소통담당관-3061(2025.4.2.)',docA:'경기도선관위 지도1과-1340(2025.4.14.)'},
{id:25,tags:['행사·이벤트'],searchTags:['행사','기자단','기회기자단','인센티브','활동우수자'],question:'경기도가 운영하는 기자단에게 활동우수자를 대상으로 지방자치단체의 명의로 소정의 인센티브를 제공할 수 있는지?',answer:'지방자치단체가 「경기도 학생 및 도민 기자단 운영 조례」제7조에 따라 경기도 학생 및 도민 기자단 활동우수자에게 지방자치단체 명의로 소정의 인센티브를 제공하는 것은 「공직선거법」 제112조 제2항 제4호 나목에 따라 가능하나, 도지사의 명의로는 제공할 수 없음',law:'공직선거법 제86조',docQ:'도민소통담당관-3647(2025.4.21.)',docA:'경기도선관위 지도1과-1672(2025.4.29.)'},
{id:26,tags:['광고','홈페이지·온라인','인쇄·홍보물'],searchTags:['광고제작'],question:'대북전단 살포 신고 안내를 홍보물로 제작하여 홍보할 수 있는지?',answer:'단순 살포에 대한 신고 접수를 받기 위한 목적으로는 가능할 것이나, 도민의 일상생활에 필요한 정보제공 및 재난관리·안전사고의 예방을 위한 범위를 벗어나 경기도의 사업계획·추진실적 그 밖에 활동상황 등을 알리기 위한 내용이 포함된 홍보물을 경기도가 개설·운영하는 홈페이지 또는 유튜브(‘알림’기능 설정 제외)에 게시하는 외에 G버스TV·SNS 등을 통해 홍보하는 경우에는 「공직선거법」제86조 제5항에 따라 분기별로 1종 1회로 발행·배부 또는 방송이 제한되는 홍보물에 해당될 것입니다.',law:'공직선거법 제86조',docQ:'도민소통담당관-5461(2025.6.24.)',docA:'경기도선관위 지도1과-2462(2025.7.1.)'},
{id:27,tags:['광고'],searchTags:['옥외매체','GBUSTV','옥외광고'],question:'성과홍보를 G버스TV 등 매체를 통하여 방송할 수 있는지?',answer:'지방자치단체가 당해 지방자치단체의 사업계획·추진실적 그 밖에 지방자치단체의 활동상황을 알리기 위한 홍보물을 G버스TV 등 매체를 통하여 방송하는 것은 「공직선거법」 제86조 제5항에 따라 분기별 1종 1회로 발행·배부가 제한되는 홍보물에 해당될 것입니다.',law:'공직선거법 제86조',docQ:'도민소통담당관-7563(2025.8.25.)',docA:'경기도선관위 지도1과-3347(2025.9.2.)'},
{id:28,tags:['행사·이벤트'],searchTags:['행사','맞손토크','함께그린페스티벌','함께그린','소통행사','소통','소상공인','푸드트럭'],question:'경기도가 주최하는 도민소통행사에 소상공인 장터, 푸드트럭 등을 운영할 수 있는지?',answer:'지방자치단체가 개최하는 행사에서 소상공인 등이 참가하여 상생장터, 푸드트럭 등을 운영하는 것은 공직선거법상 제한되지 않음',law:'공직선거법 제86조',docQ:'정책홍보담당관-8365(2025.9.19.)',docA:'경기도선관위 지도1과-3661(2025.9.29.)'},
{id:29,tags:['SNS','행사·이벤트','광고','홈페이지·온라인','인쇄·홍보물'],searchTags:['행사홍보','행사','홍보','SNS','홈페이지','매체홍보'],question:'경기도가 주최하는 도민소통행사를 매체를 활용해 홍보할 수 있는지?',answer:'지방자치단체가 개최하는 행사를 안내하기 위하여 통상적인 범위에서 보도자료를 배포하거나 SNS 및 인쇄물, 녹음물, 녹화물 등을 통해 홍보하는 것은 가능할 것이나, 내용에 지방자치단체장의 성명, 사진 등이 게재되는 경우에는 공직선거법 제86조제5항의 분기별 1종 1회로 제한되는 홍보물에 해당될 것',law:'공직선거법 제86조',docQ:'정책홍보담당관-8365(2025.9.19.)',docA:'경기도선관위 지도1과-3661(2025.9.29.)'},
{id:30,tags:['행사·이벤트'],searchTags:['행사','맞손토크','함께그린페스티벌','함께그린','위촉식','도지사 참석','참석'],question:'경기도가 주최하는 도민소통행사에 도지사가 참석하여 토크쇼를 진행할 수 있는지?',answer:'지방자치단체가 개최하는 행사에서 지방자치단체장이 도민소통을 위한 토크쇼를 개최하는 것만으로는 공직선거법상 제한되지 아니할 것이나, 과정에서 지방자치단체장의 업적홍보나 지지, 선전에 이르는 내용이 포함되는 경우에는 행위양태에 따라 같은 법 제9조, 제60조, 제85조, 제86조, 제254조 등에 위반될 수 있을 것임',law:'공직선거법 제9조, 제60조, 제85조, 제86조, 제254조',docQ:'정책홍보담당관-8365(2025.9.19.)',docA:'경기도선관위 지도1과-3661(2025.9.29.)'},
{id:31,tags:['행사·이벤트'],searchTags:['행사','위촉식','체육대회','체육행사','도지사 참석','참석'],question:'경기도가 주최하는 도민소통행사에 도지사가 참석할 수 있는지?',answer:'지방자치단체가 개최하는 행사에서 지방자치단체장이 패션쇼, 지방자치 30주년 서명식, 홍보대사 위촉식, 기념촬영에 참여하거나 행사장을 순회하는 것은 제한되지 아니할 것임',law:'공직선거법 제86조',docQ:'정책홍보담당관-8365(2025.9.19.)',docA:'경기도선관위 지도1과-3661(2025.9.29.)'},
{id:32,tags:['SNS','행사·이벤트','홈페이지·온라인'],searchTags:['행사','SNS','소통행사','행사홍보'],question:'경기도가 직원 소통 행사 종료 후 관련 사진 및 영상을 경기도지사 개인 SNS, 경기도 홍보대사 개인 SNS, 경기도청 마스코트 SNS 계정에 게시할 수 있는지?',answer:'지방자치단체 명의로 운영되는 SNS에 지방자치단체의 사업계획, 추진실적 그 밖에 지방자치단체의 활동상황을 알리는 경우에는 공직선거법 제86조제5항에 따라 분기별 1종 1회로 발행, 배부가 제한되는 홍보물에 해당될 것이며, 내용이 지방자치단체장의 업적홍보에 이르거나 선거에 영향을 미칠 수 있는 내용이 포함되는 경우에는 같은 법 제9조, 제60조, 제85조, 제86조 등에 위반될 것임',law:'공직선거법 제9조, 제60조, 제85조, 제86조',docQ:'정책홍보담당관-9035(2025.10.14.)',docA:'경기도선관위 지도1과-3661(2025.10.20.)'},
{id:33,tags:['행사·이벤트'],searchTags:['행사','기념품','경품'],question:'경기도가 직원 소통 행사에 참석한 경기도 직원들을 대상으로 기념품 또는 경품 등을 제공할 수 있는지?',answer:'지방자치단체가 법령(중앙행정기관이 법령에 근거하여 수립, 시달한 지침 포함) 또는 대상, 방법, 범위 등을 구체적으로 정한 당해 지방자치단체의 조례에 근거 없이 소속 직원을 대상으로 기념품, 경품 등을 제공하는 것은 행위양태에 따라 공직선거법 제113조 또는 제114조에 위반될 것임',law:'공직선거법 제113조, 제114조',docQ:'정책홍보담당관-9035(2025.10.14.)',docA:'경기도선관위 지도1과-3661(2025.10.20.)'},

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];}); }

function fmt(d){ return d.getFullYear()+'. '+(d.getMonth()+1)+'. '+d.getDate()+'.'; }
function seg(dv){
  if(dv<=0) return {key:'after',label:'선거일 이후',short:'선거 이후',tab:'daily'};
  if(dv<=60) return {key:'d60',label:'선거일 전 60일 제한 기간',short:'60일 제한',tab:'before'};
  if(dv<=180) return {key:'d180',label:'선거일 전 180일 제한 기간',short:'180일 제한',tab:'before'};
  return {key:'normal',label:'상시(제한 없음) 기간',short:'상시',tab:'daily'};
}
function segColors(key){
  if(key==='normal') return {bg:'var(--ok-bg)',bd:'var(--ok-bd)',tx:'var(--ok-t)',icon:'✓'};
  if(key==='d180') return {bg:'var(--warn-bg)',bd:'var(--warn-bd)',tx:'var(--warn-t)',icon:'⚠'};
  if(key==='d60') return {bg:'var(--no-bg)',bd:'var(--no-bd)',tx:'var(--no-t)',icon:'✕'};
  return {bg:'var(--bg)',bd:'var(--line)',tx:'var(--sub)',icon:'·'};
}
function ddayText(){ var d=days(); return d>0?'D-'+d:(d===0?'D-DAY':'D+'+(-d)); }
function core(c){ return {id:c.id,question:c.question,answer:c.answer,law:c.law,docQ:c.docQ,docA:c.docA,tags:c.tags||[],tagText:(c.tags||[]).join(' · ')}; }

/* highlight query matches inside text, returning escaped HTML */
function hl(text,q){
  text = String(text==null?'':text);
  if(!q) return esc(text);
  var ql = q.trim().toLowerCase();
  if(!ql) return esc(text);
  var lower = text.toLowerCase(), out='', i=0, idx;
  while((idx=lower.indexOf(ql,i))!==-1){
    if(idx>i) out+=esc(text.slice(i,idx));
    out+='<mark>'+esc(text.slice(idx,idx+ql.length))+'</mark>';
    i=idx+ql.length;
  }
  if(i<text.length) out+=esc(text.slice(i));
  return out;
}
function fmtCopy(c){ return '[사례] '+c.question+'\n\n■ 선관위 회답\n'+c.answer+'\n\n■ 관련 법조항\n'+c.law+'\n\n■ 문서번호\n질의 '+c.docQ+' / 회답 '+c.docA; }
function copy(text,key){ try{ navigator.clipboard && navigator.clipboard.writeText(text); }catch(e){} S.copiedKey=key; clearTimeout(copyTimer); copyTimer=setTimeout(function(){ S.copiedKey=null; renderView(); },1600); renderView(); }

function caseById(id){ for(var i=0;i<CASES.length;i++) if(CASES[i].id===id) return CASES[i]; return CASES[0]; }
function filteredCases(q,tag){
  var list = CASES.slice();
  if(tag && tag!=='전체') list = list.filter(function(c){ return (c.tags||[]).indexOf(tag)!==-1; });
  if(q){ var ql=q.trim().toLowerCase(); list = list.filter(function(c){
    return (c.question+' '+c.answer+' '+(c.searchTags||[]).join(' ')+' '+(c.tags||[]).join(' ')).toLowerCase().indexOf(ql)!==-1; }); }
  return list;
}

function updateCalcResult(){
  var box=document.getElementById('calc-result'); if(!box) return;
  if(!S.calcInput){ box.innerHTML=''; return; }
  var cd=new Date(S.calcInput);
  if(isNaN(cd)){ box.innerHTML=''; return; }
  var elec=elecDate();
  var cd0=new Date(cd.getFullYear(),cd.getMonth(),cd.getDate());
  var d2=Math.round((elec-cd0)/86400000);
  var seg2=seg(d2), col=segColors(seg2.key);
  var tabLabel=seg2.tab==='before'?'선거일 전 유의사항':'일상 홍보 유의사항';
  box.innerHTML='<div style="margin-top:12px;padding:10px 12px;border-radius:8px;font-size:14px;line-height:1.55;background:'+col.bg+';border:1px solid '+col.bd+';color:'+col.tx+'">'+
    '<span style="font-weight:700">'+col.icon+' '+esc(fmt(cd0))+'은(는) 선거일 전 '+d2+'일 → '+esc(seg2.label)+'</span>'+
    '<button data-calctab="'+seg2.tab+'" style="display:block;margin-top:6px;background:none;border:none;padding:0;color:var(--navy);font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline">'+esc(tabLabel)+' 보기 →</button>'+

}

function renderReport(){

  var body;

      '<textarea data-rf="a" rows="3" style="padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:15px;line-height:1.6">'+esc(S.r.a)+'</textarea>'+

        '<input data-rf="date" value="'+esc(S.r.date)+'" placeholder="회답 일자·문서번호 (선택)" style="height:44px;padding:0 12px;border:1px solid var(--line);border-radius:8px;font-size:15px">'+
        '<input data-rf="law" value="'+esc(S.r.law)+'" placeholder="관련 법조항 (선택)" style="height:44px;padding:0 12px;border:1px solid var(--line);border-radius:8px;font-size:15px">'+
      '</div>'+
      '<input data-rf="contact" value="'+esc(S.r.contact)+'" placeholder="제보자 소속·연락처 (선택 — 검수 시 확인용)" style="height:44px;padding:0 12px;border:1px solid var(--line);border-radius:8px;font-size:15px">'+
      '<input data-rf="hp" value="'+esc(S.r.hp)+'" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px">'+
      (invalid?'<div style="font-size:14px;color:var(--no-t)">질의 요지와 선관위 회답 내용은 필수입니다.</div>':'')+
      (failed?'<div style="display:flex;gap:8px;align-items:flex-start;padding:10px 12px;border-radius:8px;background:var(--warn-bg);border:1px solid var(--warn-bd);color:var(--warn-t);font-size:14px"><span aria-hidden="true" style="font-weight:700">⚠</span><span>전송하지 못했습니다. 잠시 후 다시 시도하거나 담당자에게 직접 전달해 주세요.</span></div>':'')+
      '<div><button id="report-submit"'+(sending?' disabled':'')+' style="height:44px;padding:0 20px;border:none;border-radius:8px;background:'+btnBg+';color:#fff;font-size:15px;font-weight:600;cursor:pointer">'+btnLabel+'</button></div>'+

var REPORT_MAX = 4000; /* 필드별 최대 길이 — 과대 페이로드 방어(1차). 서버측에서도 반드시 재검증 */
function submitReport(){
  if(S.r.hp) return; /* honeypot: 봇 제출 무시 */
  if(!S.r.q.trim()||!S.r.a.trim()){ S.reportStatus='invalid'; renderReport(); return; }
  /* 길이 상한 — 클라이언트는 우회 가능하므로 방어의 1차선일 뿐, GAS doPost에서 재검증 필요 */
  S.r.q=S.r.q.slice(0,REPORT_MAX); S.r.a=S.r.a.slice(0,REPORT_MAX);
  S.r.date=S.r.date.slice(0,200); S.r.law=S.r.law.slice(0,500); S.r.contact=S.r.contact.slice(0,300);
  S.reportStatus='sending'; renderReport();
  if(CONFIG.reportPostUrl){
    var payload={ type:'report', question:S.r.q, answer:S.r.a, date:S.r.date, law:S.r.law, contact:S.r.contact };
    /* no-cors: GAS 웹앱은 CORS 응답 헤더를 주지 않아 응답 본문을 읽을 수 없으므로,
       simple request(text/plain)로 저장만 하고 성공 처리한다. */
    var done=false;
    var ac=(typeof AbortController!=='undefined')?new AbortController():null;
    var timer=setTimeout(function(){ if(done)return; done=true; if(ac)ac.abort(); S.reportStatus='failed'; renderReport(); },12000);
    var opt={ method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload) };
    if(ac) opt.signal=ac.signal;
    fetch(CONFIG.reportPostUrl,opt)
      .then(function(){ if(done)return; done=true; clearTimeout(timer); S.reportStatus='success'; S.r={q:'',a:'',date:'',law:'',contact:'',hp:''}; renderReport(); })
      .catch(function(){ if(done)return; done=true; clearTimeout(timer); S.reportStatus='failed'; renderReport(); });
  } else {
    setTimeout(function(){ S.reportStatus='success'; renderReport(); },1200);
  }
}

/* ============================================================
   LIVE DATA (gviz) with snapshot fallback
   ============================================================ */
function parseGviz(text){
  var start=text.indexOf('{'), end=text.lastIndexOf('}');
  if(start<0||end<0) return null;
  var obj=JSON.parse(text.slice(start,end+1));
  var tbl=obj.table; if(!tbl) return null;
  var rows=(tbl.rows||[]).map(function(r){ return (r.c||[]).map(function(cell){ return cell&&cell.v!=null?String(cell.v):''; }); });
  var labels=(tbl.cols||[]).map(function(col){ return (col.label||'').trim(); });
  /* locate header row (blank first row in sheet) */
  var headerIdx=-1;
  for(var i=0;i<rows.length;i++){ if((rows[i][0]||'').trim()==='ID'){ headerIdx=i; break; } }
  var header, dataRows;
  if(headerIdx>=0){ header=rows[headerIdx].map(function(s){return s.trim();}); dataRows=rows.slice(headerIdx+1); }
  else { header=labels; dataRows=rows; }
  function col(name){ return header.indexOf(name); }
  var iId=col('ID'), iSearch=col('검색 태그'), iMedia=col('매체 태그'), iQ=col('질의 요지'), iA=col('회답 요지'), iDq=col('질의 문서번호'), iDa=col('회답 문서번호'), iLaw=col('관련 법조항');
  if(iId<0||iQ<0||iA<0) return null;
  var out=[];
  dataRows.forEach(function(row){
    var idRaw=(row[iId]||'').trim(); if(!idRaw) return;
    var id=parseInt(idRaw,10); if(isNaN(id)) return;
    var splitTags=function(x){ return (x||'').split(',').map(function(s){return s.trim();}).filter(Boolean); };
    out.push({
      id:id,
      searchTags:splitTags(row[iSearch]),
      tags:splitTags(row[iMedia]),
      question:(row[iQ]||'').trim(),
      answer:(row[iA]||'').trim(),
      docQ:iDq>=0?(row[iDq]||'').trim():'',
      docA:iDa>=0?(row[iDa]||'').trim():'',
      law:iLaw>=0?(row[iLaw]||'').trim():''
    });
  });
  return out.length?out:null;
}
function loadLive(){
  var url='https://docs.google.com/spreadsheets/d/'+CONFIG.sheetId+'/gviz/tq?tqx=out:json';
  fetch(url).then(function(res){ return res.text(); }).then(function(text){
    var parsed=parseGviz(text);
    if(parsed && parsed.length){
      CASES=parsed;
      if(!caseById(S.cs.selectedId)) S.cs.selectedId=CASES[0].id;
      /* refresh only non-input regions to preserve focus/caret */
      if(S.view==='home'){ if(document.getElementById('home-results')) updateHome(); }
      else if(S.view==='cases'){ if(document.getElementById('cs-rows')){ updateCasesList(); updateCasesDetail(); } }
    }
  }).catch(function(){ /* keep snapshot */ });
}
