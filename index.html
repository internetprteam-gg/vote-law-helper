function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];}); }
function reduced(){ return window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches; }
function today0(){ var d=new Date(); d.setHours(0,0,0,0); return d; }
function elecDate(){
  var s=CONFIG.electionDate;
  if(s && /^\d{4}-\d{2}-\d{2}$/.test(s)){ var p=s.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
  /* electionDate 미설정 시: 오프셋 기반 대체 */
  var off=(CONFIG.daysUntilElection==null)?120:CONFIG.daysUntilElection;
  return new Date(today0().getTime()+off*86400000);
}
function days(){ return Math.round((elecDate()-today0())/86400000); } /* 오늘 기준 D-day 자동 계산 */
function fmt(d){ return d.getFullYear()+'. '+(d.getMonth()+1)+'. '+d.getDate()+'.'; }
function seg(dv){
  if(dv<=0) return {key:'after',label:'선거일 이후',short:'선거 이후',tab:'daily'};
  if(dv<=60) return {key:'d60',label:'선거일 전 60일 제한 기간',short:'60일 제한',tab:'before'};
  if(dv<=180) return {key:'d180',label:'선거일 전 180일 제한 기간',short:'180일 제한',tab:'before'};
  return {key:'normal',label:'상시(제한 없음) 기간',short:'상시',tab:'daily'};
}
function segColors(key){
  if(key==='normal') return {bg:'var(--ok-bg)',bd:'var(--ok-bd)',tx:'var(--ok-t)',icon:'✓'};
  if(key==='d180') return {bg:'var(--warn-bg)',bd:'var(--warn-bd)',tx:'var(--warn-t)',icon:'⚠'};
  if(key==='d60') return {bg:'var(--no-bg)',bd:'var(--no-bd)',tx:'var(--no-t)',icon:'✕'};
  return {bg:'var(--bg)',bd:'var(--line)',tx:'var(--sub)',icon:'·'};
}
function ddayText(){ var d=days(); return d>0?'D-'+d:(d===0?'D-DAY':'D+'+(-d)); }
function core(c){ return {id:c.id,question:c.question,answer:c.answer,law:c.law,docQ:c.docQ,docA:c.docA,tags:c.tags||[],tagText:(c.tags||[]).join(' · ')}; }

/* highlight query matches inside text, returning escaped HTML */
function hl(text,q){
  text = String(text==null?'':text);
  if(!q) return esc(text);
  var ql = q.trim().toLowerCase();
  if(!ql) return esc(text);
  var lower = text.toLowerCase(), out='', i=0, idx;
  while((idx=lower.indexOf(ql,i))!==-1){
    if(idx>i) out+=esc(text.slice(i,idx));
    out+='<mark>'+esc(text.slice(idx,idx+ql.length))+'</mark>';
    i=idx+ql.length;
  }
  if(i<text.length) out+=esc(text.slice(i));
  return out;
}
function fmtCopy(c){ return '[사례] '+c.question+'\n\n■ 선관위 회답\n'+c.answer+'\n\n■ 관련 법조항\n'+c.law+'\n\n■ 문서번호\n질의 '+c.docQ+' / 회답 '+c.docA; }
function copy(text,key){ try{ navigator.clipboard && navigator.clipboard.writeText(text); }catch(e){} S.copiedKey=key; clearTimeout(copyTimer); copyTimer=setTimeout(function(){ S.copiedKey=null; renderView(); },1600); renderView(); }

function caseById(id){ for(var i=0;i<CASES.length;i++) if(CASES[i].id===id) return CASES[i]; return CASES[0]; }
function filteredCases(q,tag){
  var list = CASES.slice().sort(function(a,b){ return b.id-a.id; });
  if(tag && tag!=='전체') list = list.filter(function(c){ return (c.tags||[]).indexOf(tag)!==-1; });
  if(q){ var ql=q.trim().toLowerCase(); list = list.filter(function(c){
    return (c.question+' '+c.answer+' '+(c.searchTags||[]).join(' ')+' '+(c.tags||[]).join(' ')).toLowerCase().indexOf(ql)!==-1; }); }
  return list;
}

function showAdminPin(){
  if(S.adminAuth){ setView('admin'); return; }
  var hashMode=!CONFIG.adminTokenHash; /* 해시 미설정 → 해시 생성기 모드 */
  var ov=document.createElement('div');
  ov.id='admin-ov';
  ov.setAttribute('role','dialog');
  ov.setAttribute('aria-modal','true');
  ov.style.cssText='position:fixed;inset:0;background:rgba(15,27,51,.55);display:flex;align-items:center;justify-content:center;z-index:999';
  var inner=hashMode
    ? '<div style="font-size:13px;line-height:1.65;padding:11px 13px;border-radius:8px;background:var(--warn-bg);border:1px solid var(--warn-bd);color:var(--warn-t);margin-bottom:16px">'+
        'adminTokenHash 미설정 — 아래에 GAS ADMIN_TOKEN을 입력하면 해시를 생성합니다. 생성된 값을 index.html의 <code>adminTokenHash</code>에 붙여넣으세요.'+
      '</div>'+
      '<input id="apin" type="password" maxlength="200" placeholder="GAS ADMIN_TOKEN 입력" autocomplete="off" style="width:100%;height:46px;padding:0 14px;border:1px solid var(--line);border-radius:9px;font-size:15px;outline:none;box-sizing:border-box">'+
      '<div id="apin-err" style="min-height:18px;font-size:13px;color:var(--no-t);margin-top:5px"></div>'+
      '<div id="hash-out" style="display:none;margin-top:8px;padding:10px 12px;border-radius:8px;background:var(--bg);border:1px solid var(--line);font-size:12px;font-family:var(--mono);word-break:break-all;line-height:1.7"></div>'+
      '<div style="display:flex;gap:8px;margin-top:14px">'+
        '<button id="apin-cancel" style="flex:1;height:44px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:15px;cursor:pointer">닫기</button>'+
        '<button id="apin-ok" style="flex:1;height:44px;border:none;border-radius:9px;background:var(--navy);color:#fff;font-size:15px;font-weight:600;cursor:pointer">해시 생성</button>'+
      '</div>'
    : '<div style="font-size:13px;color:var(--muted);margin-bottom:18px">GAS ADMIN_TOKEN을 입력하세요.</div>'+
      '<input id="apin" type="password" maxlength="200" placeholder="관리자 토큰" aria-label="관리자 토큰" autocomplete="off" style="width:100%;height:46px;padding:0 14px;border:1px solid var(--line);border-radius:9px;font-size:16px;outline:none;box-sizing:border-box">'+
      '<div id="apin-err" style="min-height:18px;font-size:13px;color:var(--no-t);margin-top:5px"></div>'+
      '<div style="display:flex;gap:8px;margin-top:14px">'+
        '<button id="apin-cancel" style="flex:1;height:44px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:15px;cursor:pointer">취소</button>'+
        '<button id="apin-ok" style="flex:1;height:44px;border:none;border-radius:9px;background:var(--navy);color:#fff;font-size:15px;font-weight:600;cursor:pointer">확인</button>'+
      '</div>';
  ov.innerHTML=
    '<div style="background:#fff;border-radius:16px;padding:32px 28px;min-width:300px;max-width:400px;width:90%;box-shadow:0 12px 40px rgba(0,0,0,.22)">'+
      '<div style="font-size:18px;font-weight:700;margin-bottom:6px">관리자 모드</div>'+inner+
    '</div>';
  document.body.appendChild(ov);
  var inp=document.getElementById('apin');
  var errEl=document.getElementById('apin-err');
  var okBtn=document.getElementById('apin-ok');
  inp.focus();
  document.getElementById('apin-cancel').addEventListener('click',function(){ov.remove();});
  ov.addEventListener('click',function(ev){if(ev.target===ov)ov.remove();});

  function sha256hex(str){
    return crypto.subtle.digest('SHA-256',new TextEncoder().encode(str))
      .then(function(buf){
        return [].slice.call(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
      });
  }

  if(hashMode){
    /* 해시 생성기 모드 — 네트워크 없음, 브라우저 내에서만 동작 */
    okBtn.addEventListener('click',function(){
      var val=inp.value.trim();
      if(!val){errEl.textContent='토큰을 입력하세요.';return;}
      sha256hex(val).then(function(hex){
        var out=document.getElementById('hash-out');
        out.style.display='block';
        out.innerHTML='index.html CONFIG.adminTokenHash 에 붙여넣기:<br>'+
          '<strong style="user-select:all">'+esc(hex)+'</strong> '+
          '<button onclick="navigator.clipboard&&navigator.clipboard.writeText(this.previousElementSibling.textContent);this.textContent=\'복사됨 ✓\'" '+
          'style="height:26px;padding:0 9px;border:1px solid var(--line);border-radius:5px;background:#fff;font-size:11px;cursor:pointer">복사</button>';
      });
    });
    inp.addEventListener('keydown',function(ev){if(ev.key==='Enter')okBtn.click();});
    return;
  }

  /* 토큰 검증 모드 — 네트워크 없이 SHA-256 로컬 비교 */
  function tryToken(){
    var token=inp.value.trim();
    if(!token){errEl.textContent='토큰을 입력하세요.';return;}
    inp.disabled=true; okBtn.disabled=true; okBtn.textContent='확인 중…'; errEl.textContent='';
    sha256hex(token).then(function(hex){
      if(hex===CONFIG.adminTokenHash){
        S.adminAuth=token; ov.remove(); setView('admin');
      } else {
        inp.disabled=false; okBtn.disabled=false; okBtn.textContent='확인';
        errEl.textContent='토큰이 올바르지 않습니다.'; inp.select();
      }
    }).catch(function(){
      inp.disabled=false; okBtn.disabled=false; okBtn.textContent='확인';
      errEl.textContent='오류가 발생했습니다. 다시 시도하세요.';
    });
  }
  okBtn.addEventListener('click',tryToken);
  inp.addEventListener('keydown',function(ev){if(ev.key==='Enter')tryToken();});
}

function bindAdminAdd(){
  var map={id:'af-id',tags:'af-tags',searchTags:'af-stags',question:'af-q',answer:'af-a',docQ:'af-docQ',docA:'af-docA',law:'af-law'};
  var keys=Object.keys(map);
  for(var i=0;i<keys.length;i++){ (function(k){
    var el=document.getElementById(map[k]); if(el) el.addEventListener('input',function(){S.adminForm[k]=this.value;});
  })(keys[i]); }

}

function submitAdminCase(){
  var f=S.adminForm;
  var idEl=document.getElementById('af-id'); if(idEl) f.id=idEl.value;
  var qEl=document.getElementById('af-q'); if(qEl) f.question=qEl.value;
  var aEl=document.getElementById('af-a'); if(aEl) f.answer=aEl.value;
  if(!String(f.id).trim()||!f.question.trim()||!f.answer.trim()){ S.adminFormStatus='missing'; renderAdmin(); return; }
  S.adminFormStatus='sending'; renderAdmin();
  if(!CONFIG.reportPostUrl){
    setTimeout(function(){ S.adminFormStatus='success'; S.adminForm={id:'',tags:'',searchTags:'',question:'',answer:'',docQ:'',docA:'',law:''}; renderAdmin(); loadLive(); },800);
    return;
  }
  var payload={type:'addCase',token:String(S.adminAuth||''),id:parseInt(f.id,10)||0,tags:f.tags,searchTags:f.searchTags,question:f.question,answer:f.answer,docQ:f.docQ,docA:f.docA,law:f.law};
  var done=false;
  var ac=(typeof AbortController!=='undefined')?new AbortController():null;
  var timer=setTimeout(function(){if(done)return;done=true;if(ac)ac.abort();S.adminFormStatus='error';renderAdmin();},15000);
  var opt={method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'data='+encodeURIComponent(JSON.stringify(payload))};
  if(ac) opt.signal=ac.signal;
  fetch(CONFIG.reportPostUrl,opt)
    .then(function(){if(done)return;done=true;clearTimeout(timer);S.adminFormStatus='success';S.adminForm={id:'',tags:'',searchTags:'',question:'',answer:'',docQ:'',docA:'',law:''};renderAdmin();loadLive();})
    .catch(function(){if(done)return;done=true;clearTimeout(timer);S.adminFormStatus='error';renderAdmin();});
}

function loadAdminReports(){
  S.adminReports='loading'; renderAdmin();
  var cbName='_gasCb'+Date.now();
  var sc=null;
  var timer=setTimeout(function(){
    cleanup(); S.adminReports='error:timeout'; renderAdmin();
  },15000);
  function cleanup(){
    clearTimeout(timer);
    try{ if(sc&&sc.parentNode) sc.parentNode.removeChild(sc); }catch(e){}
    delete window[cbName];
  }
  window[cbName]=function(data){
    cleanup();
    if(data&&data.ok&&Array.isArray(data.rows)){ S.adminReports=data.rows; }
    else{ S.adminReports='error:'+(data&&data.error?data.error:'unknown'); }
    renderAdmin();
  };
  sc=document.createElement('script');
  sc.src=CONFIG.reportPostUrl+'?token='+encodeURIComponent(String(S.adminAuth||''))+'&callback='+cbName;
  sc.onerror=function(){ cleanup(); S.adminReports='error:script_load_failed'; renderAdmin(); };
  document.head.appendChild(sc);
}

  S.adminFormStatus='idle';
  renderAdmin();
}

function updateCalcResult(){
  var box=document.getElementById('calc-result'); if(!box) return;
  if(!S.calcInput){ box.innerHTML=''; return; }
  var cd=new Date(S.calcInput);
  if(isNaN(cd)){ box.innerHTML=''; return; }
  var elec=elecDate();
  var cd0=new Date(cd.getFullYear(),cd.getMonth(),cd.getDate());
  var d2=Math.round((elec-cd0)/86400000);
  var seg2=seg(d2), col=segColors(seg2.key);
  var tabLabel=seg2.tab==='before'?'선거일 전 유의사항':'일상 홍보 유의사항';
  box.innerHTML='<div style="margin-top:12px;padding:10px 12px;border-radius:8px;font-size:14px;line-height:1.55;background:'+col.bg+';border:1px solid '+col.bd+';color:'+col.tx+'">'+
    '<span style="font-weight:700">'+col.icon+' '+esc(fmt(cd0))+'은(는) 선거일 전 '+d2+'일 → '+esc(seg2.label)+'</span>'+

}

var REPORT_MAX = 4000; /* 필드별 최대 길이 — 과대 페이로드 방어(1차). 서버측에서도 반드시 재검증 */
function submitReport(){
  if(S.r.hp) return; /* honeypot: 봇 제출 무시 */
  if(!S.r.q.trim()||!S.r.a.trim()){ S.reportStatus='invalid'; renderReport(); return; }
  /* 길이 상한 — 클라이언트는 우회 가능하므로 방어의 1차선일 뿐, GAS doPost에서 재검증 필요 */
  S.r.q=S.r.q.slice(0,REPORT_MAX); S.r.a=S.r.a.slice(0,REPORT_MAX);
  S.r.date=S.r.date.slice(0,200); S.r.law=S.r.law.slice(0,500); S.r.contact=S.r.contact.slice(0,300);
  S.reportStatus='sending'; renderReport();
  if(CONFIG.reportPostUrl){
    var payload={ type:'report', question:S.r.q, answer:S.r.a, date:S.r.date, law:S.r.law, contact:S.r.contact };
    /* no-cors: GAS 웹앱은 CORS 응답 헤더를 주지 않아 응답 본문을 읽을 수 없으므로,
       simple request(text/plain)로 저장만 하고 성공 처리한다. */
    var done=false;
    var ac=(typeof AbortController!=='undefined')?new AbortController():null;
    var timer=setTimeout(function(){ if(done)return; done=true; if(ac)ac.abort(); S.reportStatus='failed'; renderReport(); },12000);
    var opt={ method:'POST', mode:'no-cors', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:'data='+encodeURIComponent(JSON.stringify(payload)) };
    if(ac) opt.signal=ac.signal;
    fetch(CONFIG.reportPostUrl,opt)
      .then(function(){ if(done)return; done=true; clearTimeout(timer); S.reportStatus='success'; S.r={q:'',a:'',date:'',law:'',contact:'',hp:''}; renderReport(); })
      .catch(function(){ if(done)return; done=true; clearTimeout(timer); S.reportStatus='failed'; renderReport(); });
  } else {
    setTimeout(function(){ S.reportStatus='success'; renderReport(); },1200);
  }
}

/* ============================================================
   LIVE DATA (gviz) with snapshot fallback
   ============================================================ */
function parseGviz(text){
  var start=text.indexOf('{'), end=text.lastIndexOf('}');
  if(start<0||end<0) return null;
  var obj=JSON.parse(text.slice(start,end+1));
  var tbl=obj.table; if(!tbl) return null;
  var rows=(tbl.rows||[]).map(function(r){ return (r.c||[]).map(function(cell){ return cell&&cell.v!=null?String(cell.v):''; }); });
  var labels=(tbl.cols||[]).map(function(col){ return (col.label||'').trim(); });
  /* locate header row (blank first row in sheet) */
  var headerIdx=-1;
  for(var i=0;i<rows.length;i++){ if((rows[i][0]||'').trim()==='ID'){ headerIdx=i; break; } }
  var header, dataRows;
  if(headerIdx>=0){ header=rows[headerIdx].map(function(s){return s.trim();}); dataRows=rows.slice(headerIdx+1); }
  else { header=labels; dataRows=rows; }
  function col(name){ return header.indexOf(name); }
  var iId=col('ID'), iSearch=col('검색 태그'), iMedia=col('매체 태그'), iQ=col('질의 요지'), iA=col('회답 요지'), iDq=col('질의 문서번호'), iDa=col('회답 문서번호'), iLaw=col('관련 법조항');
  if(iId<0||iQ<0||iA<0) return null;
  var out=[];
  dataRows.forEach(function(row){
    var idRaw=(row[iId]||'').trim(); if(!idRaw) return;
    var id=parseInt(idRaw,10); if(isNaN(id)) return;
    var splitTags=function(x){ return (x||'').split(',').map(function(s){return s.trim();}).filter(Boolean); };
    out.push({
      id:id,
      searchTags:splitTags(row[iSearch]),
      tags:splitTags(row[iMedia]),
      question:(row[iQ]||'').trim(),
      answer:(row[iA]||'').trim(),
      docQ:iDq>=0?(row[iDq]||'').trim():'',
      docA:iDa>=0?(row[iDa]||'').trim():'',
      law:iLaw>=0?(row[iLaw]||'').trim():''
    });
  });
  return out.length?out:null;
}
function loadLive(){
  /* 캐시 우회: 매 로드마다 다른 쿼리(_cb)를 붙이고 no-store 로 강제 최신 요청 */
  var url='https://docs.google.com/spreadsheets/d/'+CONFIG.sheetId+'/gviz/tq?tqx=out:json&_cb='+Date.now();
  fetch(url,{cache:'no-store'}).then(function(res){
    if(!res.ok) throw new Error('HTTP '+res.status);
    return res.text();
  }).then(function(text){
    var parsed=parseGviz(text);
    if(parsed && parsed.length){
      CASES=parsed;
      LOAD_STATE='ok';
      console.log('[선거법도우미] 시트 로드 성공 · '+CASES.length+'건');
      if(CASES.length && !caseById(S.cs.selectedId)) S.cs.selectedId=CASES[0].id;
      if(S.view==='home') renderHome();
      else if(S.view==='cases'){ if(document.getElementById('cs-rows')){ updateCasesList(); updateCasesDetail(); } else renderCases(); }
    } else {
      LOAD_STATE='error';
      console.error('[선거법도우미] 시트 파싱 실패 — 헤더 행(ID 열) 또는 공개 설정을 확인하세요.');
      if(S.view==='home'||S.view==='cases') renderDbError();
    }
  }).catch(function(err){
    LOAD_STATE='error';
    console.error('[선거법도우미] 시트 로드 실패:', err&&err.message?err.message:err);
    if(S.view==='home'||S.view==='cases') renderDbError();
  });
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  document.getElementById('app').innerHTML=renderShell();
  var m=(location.hash||'').match(/#case-(\d+)/);
  if(m){ S.view='cases'; S.cs.selectedId=+m[1]; } /* data loads async; selectedId validated after */
  renderView();
  loadLive();
  window.addEventListener('hashchange',function(){
    var mm=(location.hash||'').match(/#case-(\d+)/);
    if(mm){ var i=+mm[1]; S.view='cases'; S.cs.selectedId=i; renderView(); }
  });
}
init();

})();
</script>
